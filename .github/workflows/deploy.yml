name: Deploy
on:
    push:
        branches: [main]

env:
    REGISTRY: registry.digitalocean.com
    REGISTRY_NAME: digital-project-deploy
    IMAGE_NAME: golang-health-service

jobs:
    build:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout
              uses: action/checkout@v4
            - name: Install doctl
              uses: digitalocean/action-doctl@v2
              with:
                token: ${{ secrets.DIGITALOCEAN_ACCESS_TOKEN }}
            - name: Login to DO Container Registry
              run: doctl registry login ---expriry-seconds 1200
            - name: Set up Docker Buildx
              uses: docker/setup-buildx-action@v3
            - name: Build and push
              uses: docker/build-push-action@v5
              with:
                conteext: .
                push: true
                tags: |
                  ${{ env.REGISTRY }}/${{ env.REGISTRY_NAME }}/${{ env.IMAGE_NAME }}:latest
                  ${{ env.REGISTRY }}/${{ env.REGISTRY_NAME }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
                cache-from: type=gha
                cache-to: type-gha,mode=max

    deploy:
        runs-on: ubuntu-latest
        needs: build
        steps:
            - name: Setup SSH key
              run: |
                mkdir -p ~/.ssh
                echo ${{ secrets.SSH_PRIVATE_KEY }} > ~/.ssh/deploy-key
                chmod 600 ~/.ssh/deploy-key
            - name: Add Droplet to known_hosts
              run: |
                ssh-keyscan -H ${{ secrets.DROPLET_IP }} >> ~/.ssh/known_hosts
            - name: Deploy to Droplet
              run: |
                ssh -i ~/.ssh/deploy_key root@${{ secrets.DROPLET_IP }} \
                "cd /opt/app && \
                doctl registry login -t ${{ secrets.DIGITALOCEAN_ACCESS_TOKEN }} && \
                docker compose -f docker-compose.app.yml pull && \
                docker compose -f docker-compose.app.yml up -d && \
                docker system prune -f"
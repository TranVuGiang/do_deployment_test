name: Deploy
on:
  push:
    branches: [main]

env:
  REGISTRY: registry.digitalocean.com
  REGISTRY_NAME: digital-project-deploy
  IMAGE_NAME: golang-health-service

jobs:
  build:
    runs-on: ubuntu-latest
    environment: dev
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install doctl
        uses: digitalocean/action-doctl@v2
        with:
          token: ${{ secrets.DIGITALOCEAN_ACCESS_TOKEN }}

      - name: Login to DO Container Registry
        run: doctl registry login --expiry-seconds 1200

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.REGISTRY_NAME }}/${{ env.IMAGE_NAME }}:latest
            ${{ env.REGISTRY }}/${{ env.REGISTRY_NAME }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment: dev
    steps:
      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/do_deploy_keys
          chmod 600 ~/.ssh/do_deploy_keys

      - name: Add Droplet to known_hosts
        run: ssh-keyscan -H ${{ secrets.DROPLET_IP }} >> ~/.ssh/known_hosts

      - name: Deploy to Droplet
        run: |
          ssh -i ~/.ssh/do_deploy_keys root@${{ secrets.DROPLET_IP }} \
            echo "${{ secrets.PASSPHRASE }}" \
            "cd /opt/app && \
            doctl registry login -t ${{ secrets.DIGITALOCEAN_ACCESS_TOKEN }} && \
            docker compose -f docker-compose.app.yml pull && \
            docker compose -f docker-compose.app.yml up -d && \
            docker system prune -f"

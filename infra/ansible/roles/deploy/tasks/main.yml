- name: Create app directory
  file:
    path: "{{ app_dir }}"
    state: directory
    mode: '0755'
  
- name: Render and copy docker-compose.prod.yml
  template:
    src: ../../templates/docker-compose.prod.yml.j2
    dest: "{{ app_dir }}/docker-compose.yml"
    mode: '0644'

- name: Render and copy .env file
  template:
    src: ../../templates/env.j2
    dest: "{{ app_dir }}/.env"
    mode: '0600'

- name: Render and copy docker-compose.app.yml
  template:
    src: ../../templates/docker-compose.app.yml.j2
    dest: "{{ app_dir }}/docker-compose.app.yml"
    mode: '0644'

- name: Install doctl
  shell: |
    cd /tmp
    wget -q https://github.com/digitalocean/doctl/releases/download/v1.124.0/doctl-1.124.0-linux-amd64.tar.gz
    tar xf doctl-1.124.0-linux-amd64.tar.gz
    mv doctl /usr/local/bin/
  args:
    creates: /usr/local/bin/doctl

- name: Start infrastructure containers (postgres + valkey)
  shell: docker compose up -d
  args:
    chdir: "{{ app_dir }}"

- name: Verify postgres is healthy
  shell: docker exec digital_project_postgres pg_isready -U postgres
  register: pg_check
  retries: 5
  delay: 5
  until: pg_check.rc == 0
  
- name: Login to DigitaleOcean Container Registry
  shell: doctl registry login --access-token {{ do_token }} --expiry-seconds 3600
  no_log: true

- name: Pull latest app image
  shell: docker pull registry.digitalocean.com/{{ do_registry_name }}/golang-health-service:latest

- name: Start or Restart app container
  shell: docker compose -f docker-compose.app.yml up -d --pull never --force-recreate
  args:
    chdir: "{{ app_dir }}"